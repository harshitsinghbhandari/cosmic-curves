<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Tracker - Camera</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <!-- Join Screen -->
        <div id="join-screen" class="screen">
            <h1>Join Session</h1>
            <input type="text" id="session-input" placeholder="Enter 6-char code" maxlength="6">
            <button id="btn-join" class="primary">Join</button>
            <p class="error" id="join-error"></p>
        </div>

        <!-- Camera Container -->
        <div id="camera-container" style="display: none;">
            <video id="videoElement" autoplay playsinline muted></video>
            <canvas id="overlayCanvas"></canvas>
            
            <div id="setup-ui" class="overlay-ui">
                <div class="panel">
                    <p id="setup-prompt">Starting camera...</p>
                    
                    <div id="setup-calib-step" style="display: none;">
                        <button id="btn-capture-calib" class="primary">Capture Marker</button>
                    </div>

                    <div id="setup-color-step" style="display: none;">
                        <p class="small">Sampled: <span id="color-samples">0/3</span></p>
                    </div>

                    <p id="setup-result"></p>
                    <button id="btn-start-record" class="primary" style="display: none;">Go to Record</button>
                    <p class="error" id="setup-error"></p>
                </div>
            </div>

            <div id="record-ui" class="overlay-ui" style="display: none;">
                <div class="stats-panel">
                    <p id="rec-time">00:00</p>
                    <p id="rec-frames">Frames: 0</p>
                    <p id="rec-dropped" class="error" style="display: none;">Dropped: 0</p>
                </div>
                <button id="btn-record-action" class="record-btn">RECORD</button>
            </div>
            
            <div id="processing-ui" class="overlay-ui" style="display:none;">
                <div class="panel">
                    <h3>Processing...</h3>
                    <p>Wait for results on laptop.</p>
                </div>
            </div>
        </div>
    </div>
    
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
